<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Outdoor Squad — AI Assistant Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --squad-black: #000000;
            --squad-charcoal: #39383d;
            --squad-orange: #f26522;
            --squad-orange-dark: #ea510a;
            --squad-light: #e0e0e0;
            --squad-paper: #ffffff;
            --squad-ink: #000000;
            --squad-muted: #4f4f4f;
            --squad-border: #d8d8d8;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background:
                linear-gradient(180deg, rgba(242,101,34,0.10), rgba(246,246,246,0.82) 42%),
                #f6f6f6;
            color: var(--squad-ink);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .demo-header {
            background:
                radial-gradient(circle at top left, rgba(242,101,34,0.42), transparent 30%),
                linear-gradient(135deg, var(--squad-black) 0%, var(--squad-charcoal) 100%);
            color: white;
            width: 100%;
            padding: 34px 20px 30px;
            text-align: center;
            border-bottom: 5px solid var(--squad-orange);
        }

        .demo-header h1 {
            font-size: 2.05rem;
            margin-bottom: 8px;
            letter-spacing: 0;
        }

        .demo-header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .demo-badge {
            display: inline-block;
            background: rgba(255,255,255,0.14);
            border: 1px solid rgba(255,255,255,0.26);
            padding: 5px 12px;
            border-radius: 999px;
            font-size: 0.8rem;
            margin-top: 12px;
        }

        .demo-container {
            max-width: 480px;
            width: 100%;
            margin: 30px auto;
            padding: 0 20px;
        }

        .chat-window {
            background: var(--squad-paper);
            border: 1px solid var(--squad-border);
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(23, 59, 24, 0.13);
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, var(--squad-black), var(--squad-charcoal));
            color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--squad-orange);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .chat-header-info h3 {
            font-size: 1rem;
            font-weight: 600;
        }

        .chat-header-info span {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .chat-messages {
            max-height: 320px;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.5;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.bot {
            background: #ffffff;
            color: #111a0d;
            border: 1px solid var(--squad-border);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.user {
            background: linear-gradient(135deg, var(--squad-orange-dark), var(--squad-orange));
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.typing {
            background: #ffffff;
            border: 1px solid var(--squad-border);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: bounce 1.4s infinite both;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.16s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.32s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .chat-input-area {
            display: flex;
            padding: 16px;
            gap: 8px;
            border-top: 1px solid var(--squad-border);
            background: #f6f6f6;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--squad-border);
            border-radius: 24px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input-area input:focus {
            border-color: var(--squad-orange);
        }

        .chat-input-area button {
            background: linear-gradient(135deg, var(--squad-orange-dark), var(--squad-orange));
            color: white;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: transform 0.2s;
        }

        .chat-input-area button:hover {
            transform: scale(1.05);
        }

        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 0 20px 16px;
        }

        .quick-reply {
            background: #ffffff;
            color: var(--squad-black);
            border: 1px solid var(--squad-light);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-reply:hover {
            background: rgba(242,101,34,0.10);
            border-color: var(--squad-orange);
        }
    </style>
</head>
<body>
    <div class="demo-header">
        <h1>The Outdoor Squad</h1>
        <p>Robo-Nick review chat</p>
        <div class="demo-badge">Outdoor Squad enquiry assistant</div>
    </div>

    <div class="demo-container">
        <div class="chat-window">
            <div class="chat-header">
                <div class="chat-avatar">OS</div>
                <div class="chat-header-info">
                    <h3>Robo-Nick</h3>
                    <span>Online • Outdoor Squad helper</span>
                </div>
            </div>

            <div class="chat-messages" id="messages">
                <div class="message bot">Hey, welcome in.

Ask me about classes, prices, injuries, or whether this would suit you.</div>
            </div>

            <div class="quick-replies" id="quickReplies">
                <button class="quick-reply" onclick="sendQuick('I want to get fitter but I\'m honestly a bit nervous to start')">Nervous beginner</button>
                <button class="quick-reply" onclick="sendQuick('I\'m busy, inconsistent, and usually quit after two weeks. Be honest, would this still work for me?')">Busy + inconsistent</button>
                <button class="quick-reply" onclick="sendQuick('I want to lose weight and sort my nutrition too, not just train')">Weight loss + nutrition</button>
                <button class="quick-reply" onclick="sendQuick('How do your free intro sessions actually work?')">Free intro</button>
                <button class="quick-reply" onclick="sendQuick('I\'ve got an old injury, is that going to make this a bad fit?')">Injury concern</button>
                <button class="quick-reply" onclick="sendQuick('Does this only work for super fit people already?')">Not fit yet</button>
            </div>

            <div class="chat-input-area">
                <input type="text" id="userInput" placeholder="Ask me anything..." 
                       onkeypress="if(event.key==='Enter')sendMessage()">
                <button onclick="sendMessage()">➤</button>
            </div>
        </div>

    </div>

    <script>
        const API_URL = window.location.origin + '/api/chat';
        const sessionId = 'demo-' + Math.random().toString(36).substr(2, 9);
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('userInput');
        const quickRepliesEl = document.getElementById('quickReplies');

        function addMessage(text, type) {
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            messagesEl.appendChild(msg);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return msg;
        }

        function showTyping() {
            const msg = document.createElement('div');
            msg.className = 'message typing';
            msg.id = 'typing';
            msg.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
            messagesEl.appendChild(msg);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function hideTyping() {
            const el = document.getElementById('typing');
            if (el) el.remove();
        }

        async function sendMessage() {
            const text = inputEl.value.trim();
            if (!text) return;
            
            inputEl.value = '';
            quickRepliesEl.style.display = 'none';
            addMessage(text, 'user');
            showTyping();

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, session_id: sessionId })
                });
                const data = await res.json();
                const delay = typeof data.reply_delay_ms === 'number' ? data.reply_delay_ms : 0;
                setTimeout(() => {
                    hideTyping();

                    if (data.reply) {
                        addMessage(data.reply, 'bot');
                    } else if (data.error) {
                        addMessage('Sorry, something glitched on my side. Try that once more.', 'bot');
                    }
                }, delay);
            } catch (err) {
                hideTyping();
                addMessage('Sorry, I\'m having trouble connecting right now. Give it another go in a sec.', 'bot');
            }
        }

        function sendQuick(text) {
            inputEl.value = text;
            sendMessage();
        }

        inputEl.focus();
    </script>
</body>
</html>
