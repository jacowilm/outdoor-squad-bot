name: keepalive

# Free-tier Supabase auto-pauses after ~1 week idle; when it pauses the bot's
# storage silently falls back to Render's ephemeral disk and leads stop
# persisting. A daily DB touch keeps the project active (and wakes Render).
on:
  schedule:
    - cron: '17 3 * * *'   # daily 03:17 UTC
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Touch the bot (keeps Supabase active + Render awake)
        run: |
          # /api/event -> log_event -> a Supabase write, which counts as DB activity
          curl -fsS -X POST https://outdoor-squad-bot.onrender.com/api/event \
            -H 'content-type: application/json' \
            -d '{"event_type":"keepalive","session_id":"keepalive-cron"}' || true
          curl -fsS https://outdoor-squad-bot.onrender.com/api/health || true
