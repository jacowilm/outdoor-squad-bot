<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Outdoor Squad Widget Preview</title>
  <style>
    :root {
      --bg: #f5f3ef;
      --ink: #111111;
      --muted: #5e5a56;
      --accent: #f26522;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f7f4ef 0%, #efe9e2 100%);
      color: var(--ink);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .frame {
      width: min(960px, 100%);
      min-height: 72vh;
      border-radius: 20px;
      border: 1px solid rgba(0,0,0,0.08);
      background:
        radial-gradient(circle at top right, rgba(242,101,34,0.12), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,255,255,0.88));
      box-shadow: 0 18px 50px rgba(0,0,0,0.08);
      padding: 40px;
      position: relative;
      overflow: hidden;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: 0.95;
    }
    p {
      margin: 0;
      max-width: 40rem;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.5;
    }
    .tag {
      display: inline-block;
      margin-bottom: 14px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(242,101,34,0.12);
      color: #a6400f;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .hint {
      position: absolute;
      right: 28px;
      bottom: 28px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    @media (max-width: 640px) {
      .frame { padding: 24px; min-height: 78vh; }
      .hint { left: 24px; right: 24px; bottom: 92px; }
    }
  </style>
</head>
<body>
  <main class="frame">
    <div class="tag">Embedded Widget Preview</div>
    <h1>Outdoor Squad</h1>
    <p>This page is only here to preview the embeddable chat box. The actual widget sits at the bottom-right, the same way it would on Nicholas’s website.</p>
    <div class="hint">Open the chat bubble in the bottom-right corner.</div>
  </main>
  <script src="/widget.js"></script>
</body>
</html>
